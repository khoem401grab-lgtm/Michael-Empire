name: Publish Package
on:
  push:
    branches:
      - main
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
         # бһҳбһ бһ¶бһҹбҹ„бһҡбһҖбһ¶бһҡбһ–бһ¶бһҡбһўбһ¶бһҺбһ¶бһ…бһҖбҹ’бһҡ KHOEM SOKSIVUTHA
name: "System Security Lock"

on:
  push:
    branches: [ "main" ]

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - name: "бһҸбҹ’бһҡбһҪбһҸбһ–бһ·бһ“бһ·бһҸбҹ’бһҷ бһ“бһ·бһ„бһ…бһ¶бһҖбҹӢбһҹбҹ„бһҡбһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’"
        run: |
          echo "бһҖбҹҶбһ–бһ»бһ„бһҹбҹ’бһҖбҹҒбһ“бһҡбһҖбһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’бһҠбҹӮбһӣбһҳбһ·бһ“бһ‘бһ¶бһ“бҹӢбһ…бһ¶бһҖбҹӢбһҹбҹ„бһҡ..."
          # бһ”бһүбҹ’бһҮбһ¶бһұбҹ’бһҷбһ…бһ¶бһҖбҹӢбһҹбҹ„бһҡбһӮбҹ’бһҡбһ”бҹӢбһ…бҹ’бһҡбһҖбһ…бҹҒбһүбһ…бһјбһӣбһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢ
          chmod -R 700 . 
          echo "бһҹбҹ’бһҗбһ¶бһ“бһ—бһ¶бһ–бҹ– бһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’бһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ…бһ¶бһҖбҹӢбһҹбҹ„бһҡбһҸбҹ’бһҡбһЎбһ”бҹӢбһ‘бҹ…бһңбһ·бһүбһҠбҹ„бһҷбһҮбҹ„бһӮбһҮбҹҗбһҷ вң…"

      - name: "бһҖбһ¶бһҡбһ–бһ¶бһҡбһҖбһјбһҠбһ–бһёбһҖбһ¶бһҡбһӣбһҪбһ…бһ…бһҳбҹ’бһӣбһ„"
        run: |
          echo "бһҖбҹҶбһ–бһ»бһ„бһҖбһ¶бһҡбһ–бһ¶бһҡбһңбһ·бһҳбһ¶бһ“бһҳбһ бһ·бһ‘бҹ’бһ’бһ·бһҡбһ·бһ‘бҹ’бһ’бһ‘бҹҒбһ– 7000k..."
          # бһҖбһ¶бһҡбһ–бһ¶бһҡбһҜбһҖбһҹбһ¶бһҡбһҹбҹҶбһҒбһ¶бһ“бҹӢбҹ—бһҳбһ·бһ“бһұбҹ’бһҷбһҳбһ¶бһ“бһҖбһ¶бһҡбһҖбҹӮбһ”бҹ’бһҡбҹӮбһ–бһёбһҒбһ¶бһ„бһҖбҹ’бһҡбҹ…
          git config --global core.protectNTFS true
          
