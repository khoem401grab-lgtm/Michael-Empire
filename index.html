<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMANDER KHOEM SOKSIVUTHA</title>
    <style>
        body { background: #000; color: gold; text-align: center; font-family: 'Khmer OS Battambang', sans-serif; padding: 20px; }
        .main-box { border: 4px solid gold; padding: 30px; border-radius: 15px; background: #0a0a0a; max-width: 500px; margin: 40px auto; box-shadow: 0 0 25px rgba(255, 215, 0, 0.2); }
        .nickname { font-size: 22px; color: #ff3333; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; }
        .name { font-size: 26px; color: gold; text-transform: uppercase; margin-bottom: 30px; font-weight: 900; }
        
        .gallery { display: flex; justify-content: space-between; margin-bottom: 30px; }
        .item { width: 48%; border: 1px solid #444; border-radius: 8px; padding: 5px; background: #111; }
        .item img { width: 100%; height: auto; border-radius: 5px; filter: contrast(110%); }
        .label { font-size: 14px; margin-top: 8px; color: #fff; }

        .scale-symbol { font-size: 70px; margin: 20px 0; display: block; }
        .system-text { font-size: 18px; color: gold; letter-spacing: 2px; font-weight: bold; }

        .footer-legal { margin-top: 50px; font-size: 11px; color: #666; border-top: 1px solid #222; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="main-box">
        <div class="nickname">ប្រុសពៅព្រលឹងស្ទឹងមានជ័យ</div>
        
        <div class="name">ខឹម សុខស៊ីវត្ថា</div>
        
        <div class="gallery">
            <div class="item">
                <img src="water.jpg" alt="Water">
                <div class="label">ទឹកសុទ្ធ Michael-Empire</div>
            </div>
            <div class="item">
                <img src="pills.jpg" alt="Pills">
                <div class="label">ថ្នាំសិទ្ធិ Michael-Empire</div>
            </div>
        </div>

        <span class="scale-symbol">⚖️</span>
        <div class="system-text">ប្រព័ន្ធបញ្ជាការជញ្ជីងមាស</div>

        <div class="footer-legal">
            កម្មសិទ្ធិបញ្ញាផ្លូវការរបស់លោក ខឹម សុខស៊ីវត្ថា<br>
            &copy; 2026 Michael-Empire System. All Rights Reserved.
        </div>
    </div>

</body>
</html>
