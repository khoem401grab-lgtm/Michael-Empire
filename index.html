<!DOCTYPE html>

    <style>
        body { background: #000; color: #ffd700; text-align: center; font-family: 'Khmer OS Battambang', sans-serif; padding: 20px; }
        .border-box { border: 4px solid #ffd700; padding: 25px; border-radius: 20px; background: #0a0a0a; max-width: 500px; margin: auto; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
        .nickname { color: #ff3333; font-weight: bold; margin-bottom: 5px; }
        .commander-name { font-size: 26px; color: #ffd700; font-weight: bold; margin-bottom: 25px; border-bottom: 2px solid gold; display: inline-block; padding-bottom: 5px; }

        .item { width: 48%; border: 2px solid #ffd700; border-radius: 12px; padding: 10px; background: #111; }
        .item img { width: 100%; border-radius: 8px; margin-top: 10px; }
        
        .title-water { color: #00d2ff; font-weight: bold; font-size: 20px; }
        .title-medicine { color: #ff4d4d; font-weight: bold; font-size: 20px; }

        .mic-btn { background: gold; color: black; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 20px 0; }
        
        .contact-box { margin: 20px 0; text-align: left; border: 1px dashed gold; padding: 15px; border-radius: 10px; font-size: 14px; display: inline-block; }
        .contact-link { color: #fff; text-decoration: none; }

<body onclick="speakWelcome()">

        <div class="contact-box">

            <div>📞 Call: <a href="tel:011800401" class="contact-link">011 800 401</a></div>
