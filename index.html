    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #111; color: white; margin: 0; padding: 0; }
        .empire-container { padding: 20px; border: 2px solid gold; margin: 20px; }
        
        h1 { text-align: center; color: gold; text-transform: uppercase; font-size: 20px; margin-bottom: 30px; }
        h2 { border-bottom: 2px solid white; display: inline-block; padding-bottom: 5px; font-size: 16px; }
        p { margin: 10px 0; font-size: 14px; padding-left: 20px; }
        strong { color: white; }

        /* --- ផ្នែកកែសម្រួលពិសេស៖ ដាក់រូបតុក្កតាកាន់កាប់ --- */

        /* អាណាចក្ររុក្ខជាតិ - ពណ៌ខៀវ (មានរូបមេបញ្ជាការខៀវ) */
        .blue-botanic { 
            position: relative; 
            color: #00CCFF; 
            padding-left: 55px; /* ទុកកន្លែងសម្រាប់រូប */
            margin-bottom: 30px;
        }
        
        /* ឆ្នូតពណ៌ខៀវ */
        .blue-botanic::before {
            content: '';
            position: absolute;
            left: 35px; /* ទីតាំងឆ្នូត */
            top: 0;
            bottom: 0;
            width: 8px; /* ទទឹងឆ្នូត */
            background-color: #00CCFF;
            border-radius: 4px;
        }

        /* រូបតុក្កតាកាន់កាប់ (Blue Commander) */
        .blue-botanic::after {
            content: '👮'; /* រូបតុក្កតាមេបញ្ជាការ */
            position: absolute;
            left: 0; /* ទីតាំងរូប */
            top: 50%;
            transform: translateY(-50%);
            font-size: 30px; /* ទំហំរូប */
        }

        /* ------------------------------------------- */

        /* អាណាចក្រសត្វលោក - ពណ៌ក្រហម (មានរូបមេបញ្ជាការក្រហម) */
        .red-animal { 
            position: relative; 
            color: #FF0000; 
            padding-left: 55px; /* ទុកកន្លែងសម្រាប់រូប */
        }

        /* ឆ្នូតពណ៌ក្រហម */
        .red-animal::before {
            content: '';
            position: absolute;
            left: 35px; /* ទីតាំងឆ្នូត */
            top: 0;
            bottom: 0;
            width: 8px; /* ទទឹងឆ្នូត */
            background-color: #FF0000;
            border-radius: 4px;
        }

        /* រូបតុក្កតាកាន់កាប់ (Red Commander) */
        .red-animal::after {
            content: '💂'; /* រូបតុក្កតាមេបញ្ជាការ (ទាហានយាម) */
            position: absolute;
            left: 0; /* ទីតាំងរូប */
            top: 50%;
            transform: translateY(-50%);
            font-size: 30px; /* ទំហំរូប */
        }
    </style>
