<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>COMMANDER KHOEM SOKSIVUTHA</title>
    <style>
        body { background: #1a1a1a; color: gold; text-align: center; padding: 50px; font-family: sans-serif; }
        .card { border: 5px double gold; padding: 30px; border-radius: 20px; background: #2a2a2a; box-shadow: 0 0 20px gold; }
        .scale { font-size: 100px; }
        .btn { padding: 15px 30px; font-size: 20px; cursor: pointer; border-radius: 10px; margin: 10px; font-weight: bold; border: none; }
        .blue { background: #0044ff; color: white; }
        .red { background: #ff0000; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h1>COMMANDER KHOEM SOKSIVUTHA</h1>
        <div class="scale">⚖️</div>
        <h2>ប្រព័ន្ធបញ្ជាការជញ្ជីងមាស</h2>
        <button class="btn blue" onclick="alert('🔵 បញ្ជាពណ៌ខៀវ...')">បញ្ជាពណ៌ខៀវ</button>
        <button class="btn red" onclick="alert('🔴 បញ្ជាពណ៌ក្រហម...')">បញ្ជាពណ៌ក្រហម</button>
    </div>
</body>
</html>
